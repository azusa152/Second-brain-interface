name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements-dev.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          OBSIDIAN_VAULT_PATH: /tmp/test_vault
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=backend --cov-report=term-missing --cov-fail-under=70

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements-dev.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Ruff check
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements-dev.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Run mypy
        run: mypy backend/

  security:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements-dev.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Run pip-audit
        run: |
          # All suppressed CVEs affect Pillow image-processing paths (FITS, PDF, PSD, font/coord APIs)
          # that this project never exercises — it processes only Markdown files, not images.
          # fastembed caps pillow<12.0, blocking the 12.2.0 fix; suppress until fastembed lifts the cap.
          pip-audit --desc -r requirements.txt \
            --ignore-vuln CVE-2026-25990 \
            --ignore-vuln CVE-2026-40192 \
            --ignore-vuln CVE-2026-42308 \
            --ignore-vuln CVE-2026-42309 \
            --ignore-vuln CVE-2026-42310 \
            --ignore-vuln CVE-2026-42311
