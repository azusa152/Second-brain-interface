repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # Ruff: lint + format (matches CI)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Mypy: type checking.
  # Uses `language: system` so pre-commit picks up the project's installed stubs.
  # Requires `make setup` to have been run (venv must be activated or on PATH).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        types: [python]
        args: ["backend/"]
        pass_filenames: false
